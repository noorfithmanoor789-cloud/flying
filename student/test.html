<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Test - College of Nursing Nawabshah</title>
    <link rel="stylesheet" href="../assets/styles.css">
</head>
<body>
    <header class="header">
        <h2>College of Nursing (Female) - Online Examination</h2>
        <h3>Shaheed Benazirabad, Nawabshah</h3>
        <p>Student: <strong id="studentName"></strong></p>
    </header>

    <div class="timer" id="timer">Time Left: 30:00</div>

    <main class="container">
        <form id="examForm">
            <div id="questions"></div>

            <div class="actions">
                <button type="submit">Submit Test</button>
            </div>
        </form>

        <form name="exam-results" netlify data-netlify="true" hidden>
            <input type="hidden" name="form-name" value="exam-results">
            <input type="hidden" name="student_name">
            <input type="hidden" name="username">
            <input type="hidden" name="score">
            <input type="hidden" name="scored_total">
            <input type="hidden" name="total_questions">
            <input type="hidden" name="percentage">
            <input type="hidden" name="status">
            <input type="hidden" name="unscored_questions">
            <input type="hidden" name="submitted_at">
            <textarea name="answers_json"></textarea>
        </form>
    </main>

    <script src="../assets/data.js"></script>
    <script src="../assets/app.js"></script>
    <script>
        ExamApp.initTest();
    </script>
</body>
</html>
