<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - College of Nursing Nawabshah</title>
    <link rel="stylesheet" href="../assets/styles.css">
</head>
<body>
    <main class="page">
        <section class="login-box">
            <h1 class="brand-title">College of Nursing (Female)</h1>
            <h2 class="brand-subtitle">Shaheed Benazirabad, Nawabshah</h2>
            <hr>

            <div class="notice">
                <p><strong>Dear Students,</strong></p>
                <p>This is your test link. Please login using your provided username and password.</p>
                <p><strong>Total Questions:</strong> 84<br><strong>Time Duration:</strong> 90 minutes</p>
            </div>

            <form id="loginForm" autocomplete="off">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required>
                </div>

                <p id="loginError" class="error" aria-live="polite"></p>
                <button type="submit">Login</button>
            </form>
        </section>
    </main>

    <script src="../assets/data.js"></script>
    <script src="../assets/app.js"></script>
    <script>
        ExamApp.initLogin();
    </script>
</body>
</html>
