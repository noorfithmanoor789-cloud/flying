<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Online Examination System</title>
    <link rel="stylesheet" href="../assets/styles.css">
</head>
<body>
    <header class="site-header">
        <div class="site-header__brand">
            <img src="../assets/logo.jpeg" alt="Institution Logo" class="site-header__logo" onerror="this.style.visibility='hidden'">
        </div>
        <h1 class="site-header__title">Online Examination System</h1>
        <div class="site-header__meta">
            <span>College of Nursing</span>
        </div>
    </header>

    <main class="page">
        <section class="login-box">
            <h1 class="brand-title">Student Login</h1>
            <p class="brand-subtitle">College of Nursing (Female) — Shaheed Benazirabad, Nawabshah</p>
            <hr class="divider">

            <div class="notice">
                <p><strong>Dear Students,</strong></p>
                <p>Please sign in with your assigned username and password to access the online examination portal.</p>
                <p><strong>Duration:</strong> 90 minutes &nbsp;|&nbsp; <strong>Format:</strong> Multiple Choice (MCQ)</p>
            </div>

            <form id="loginForm" autocomplete="off">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" placeholder="Enter your username" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter your password" required>
                </div>

                <p id="loginError" class="error" aria-live="polite"></p>

                <div class="actions">
                    <button type="submit">Sign In</button>
                </div>
            </form>
        </section>
    </main>

    <script src="../assets/data.js"></script>
    <script src="../assets/app.js"></script>
    <script>
        ExamApp.initLogin();
    </script>
</body>
</html>
