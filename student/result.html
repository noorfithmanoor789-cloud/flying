<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Result - Online Examination System</title>
    <link rel="stylesheet" href="../assets/styles.css">
</head>
<body>
    <header class="site-header">
        <div class="site-header__brand">
            <img src="../assets/logo.jpeg" alt="Institution Logo" class="site-header__logo" onerror="this.style.visibility='hidden'">
        </div>
        <h1 class="site-header__title">Online Examination System</h1>
        <div class="site-header__meta">
            <strong id="studentName"></strong>
            <span>Examination Result</span>
        </div>
    </header>

    <main class="page">
        <section class="result-box result-card">
            <span class="result-badge" id="resultBadge">Result</span>
            <h1 class="brand-title">Examination Result</h1>
            <p class="brand-subtitle">College of Nursing (Female) — Shaheed Benazirabad, Nawabshah</p>
            <hr class="divider">

            <p class="score-label">Your Score</p>
            <p class="score" id="score">0 / 0</p>
            <p class="percentage-display" id="percentage">0%</p>

            <div class="result-stats">
                <div class="stat-box">
                    <span class="stat-box__value" id="totalQuestions">0</span>
                    <span class="stat-box__label">Total Questions</span>
                </div>
                <div class="stat-box">
                    <span class="stat-box__value" id="correctCount">0</span>
                    <span class="stat-box__label">Correct</span>
                </div>
                <div class="stat-box">
                    <span class="stat-box__value" id="wrongCount">0</span>
                    <span class="stat-box__label">Wrong</span>
                </div>
            </div>

            <h3 id="status"></h3>
            <p id="unscoredNote"></p>

            <div class="actions">
                <button type="button" class="btn" id="downloadResultBtn">Download Full Result</button>
                <a href="dashboard.html" class="btn secondary">Back to Dashboard</a>
                <a href="logout.html" class="btn secondary" id="logoutLink">Logout</a>
            </div>
        </section>
    </main>

    <script src="../assets/data.js"></script>
    <script src="../assets/app.js"></script>
    <script>
        ExamApp.initResult();
    </script>
</body>
</html>
